<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | GreenBulk</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream">

    <!-- Sticky Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand brand-font fs-3" href="index.html">
                Green<span class="text-accent">Bulk</span>
            </a>
            <div class="ms-auto">
                <a href="products.html" class="btn btn-outline btn-sm px-3">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container py-4">
            <h1 class="display-5 fw-bold mb-5">YOUR <span class="text-accent">FUEL</span> CART</h1>

            <div class="row g-4">
                <!-- Cart Items -->
                <div class="col-lg-8">
                    <div id="cart-items-container">
                        <!-- Items loaded via JS -->
                    </div>
                </div>

                <!-- Summary Sidebar -->
                <div class="col-lg-4">
                    <div class="bg-white p-4 rounded-4 shadow-sm">
                        <h4 class="fw-bold mb-4">ORDER SUMMARY</h4>
                        <div class="d-flex justify-content-between mb-2">
                             <span>Subtotal</span>
                             <span id="subtotal">₹0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                             <span>Shipping</span>
                             <span class="text-success">FREE</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                             <span>GST (Included)</span>
                             <span>-</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                             <h4 class="fw-bold">TOTAL</h4>
                             <h4 class="fw-bold text-primary" id="total-amount">₹0.00</h4>
                        </div>
                        <div class="d-grid">
                            <a href="checkout.html" id="checkout-btn" class="btn btn-primary btn-lg disabled">PROCEED TO CHECKOUT</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container text-center opacity-50">
            <p>&copy; 2026 GreenBulk Nutrition. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });

        function renderCartPage() {
            const container = document.getElementById('cart-items-container');
            const cart = JSON.parse(localStorage.getItem('gb_cart')) || [];
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-5 rounded-5 text-center shadow-sm">
                        <i class="fa-solid fa-cart-arrow-down fa-4x text-accent mb-4"></i>
                        <h3>Your cart is empty!</h3>
                        <p class="text-muted">Start adding some natural fuel to see it here.</p>
                        <a href="products.html" class="btn btn-primary mt-3">SHOP PRODUCTS</a>
                    </div>
                `;
                document.getElementById('checkout-btn').classList.add('disabled');
                return;
            }

            document.getElementById('checkout-btn').classList.remove('disabled');

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="bg-white p-4 rounded-4 shadow-sm mb-3 d-flex align-items-center">
                        <img src="${item.image}" alt="${item.name}" class="img-fluid rounded-3" style="width: 80px; height: 80px; object-fit: contain;" onerror="this.src='https://placehold.co/100x100?text=${encodeURIComponent(item.name)}'">
                        <div class="ms-4 flex-grow-1">
                            <h5 class="fw-bold mb-1">${item.name}</h5>
                            <p class="text-muted mb-0">₹${parseFloat(item.price).toLocaleString('en-IN')}</p>
                        </div>
                        <div class="d-flex align-items-center me-4">
                            <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${index}, -1)">-</button>
                            <span class="mx-3 fw-bold">${item.quantity}</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                        <div class="text-end" style="min-width: 100px;">
                            <h5 class="fw-bold text-primary mb-1">₹${itemTotal.toLocaleString('en-IN')}</h5>
                            <button class="btn btn-link text-danger p-0 text-decoration-none small" onclick="removeItem(${index})"><i class="fa-solid fa-trash-can me-1"></i>Remove</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').innerText = `₹${total.toLocaleString('en-IN')}`;
            document.getElementById('total-amount').innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('gb_cart'));
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('gb_cart', JSON.stringify(cart));
            renderCartPage();
            updateCartCount();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('gb_cart'));
            cart.splice(index, 1);
            localStorage.setItem('gb_cart', JSON.stringify(cart));
            renderCartPage();
            updateCartCount();
        }
    </script>
</body>
</html>
