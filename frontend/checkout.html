<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | GreenBulk</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream">

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand brand-font fs-3" href="index.html">
                Green<span class="text-accent">Bulk</span>
            </a>
        </div>
    </nav>

    <section class="py-5">
        <div class="container py-4">
            <div class="row g-5">
                <!-- Data Form -->
                <div class="col-lg-7">
                    <div class="bg-white p-5 rounded-5 shadow-sm">
                        <h3 class="fw-bold mb-4">DELIVERY DETAILS</h3>
                        <form id="checkout-form">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <input type="text" class="form-control rounded-3 p-3" id="customer_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control rounded-3 p-3" id="customer_email" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Phone Number</label>
                                    <input type="tel" class="form-control rounded-3 p-3" id="customer_phone" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">Complete Address</label>
                                    <textarea class="form-control rounded-3 p-3" id="customer_address" rows="3" required></textarea>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-5">
                    <div class="bg-white p-5 rounded-5 shadow-sm">
                        <h3 class="fw-bold mb-4">YOUR ORDER</h3>
                        <div id="checkout-items" class="mb-4">
                            <!-- Items list here -->
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="fs-5">Total Amount</span>
                            <span class="fs-4 fw-bold text-primary" id="final-total">₹0.00</span>
                        </div>
                        <p class="text-muted small mb-4"><i class="fa-solid fa-shield-halved text-success me-2"></i>Secure, natural checkout via Razorpay</p>
                        
                        <div class="d-grid mt-4">
                            <button type="button" onclick="initiatePayment()" id="pay-btn" class="btn btn-primary btn-lg py-3">
                                <i class="fa-solid fa-lock me-2"></i>COMPLETE ORDER
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCheckoutSummary();
        });

        function renderCheckoutSummary() {
            const itemsContainer = document.getElementById('checkout-items');
            const cart = JSON.parse(localStorage.getItem('gb_cart')) || [];
            
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            let total = 0;
            itemsContainer.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">${item.name} x ${item.quantity}</span>
                        <span class="fw-bold">₹${(item.price * item.quantity).toLocaleString('en-IN')}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('final-total').innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        async function initiatePayment() {
            const form = document.getElementById('checkout-form');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const payBtn = document.getElementById('pay-btn');
            payBtn.disabled = true;
            payBtn.innerText = 'Initializing...';

            const cart = JSON.parse(localStorage.getItem('gb_cart'));
            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

            try {
                // 1. Create Order in Backend
                const response = await fetch(`${API_BASE_URL}/create_order.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cart,
                        total: total,
                        customer: {
                            name: document.getElementById('customer_name').value,
                            email: document.getElementById('customer_email').value,
                            phone: document.getElementById('customer_phone').value,
                            address: document.getElementById('customer_address').value
                        }
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // 2. Open Razorpay Checkout
                    const options = {
                        "key": "rzp_test_YOUR_KEY_HERE", // User needs to replace this
                        "amount": result.amount, 
                        "currency": "INR",
                        "name": "GreenBulk Nutrition",
                        "description": "Bulk Order #" + result.order_id,
                        "order_id": result.razorpay_order_id,
                        "handler": function (response){
                            verifyPayment(response, result.order_id);
                        },
                        "prefill": {
                            "name": document.getElementById('customer_name').value,
                            "email": document.getElementById('customer_email').value,
                            "contact": document.getElementById('customer_phone').value
                        },
                        "theme": { "color": "#4E342E" }
                    };
                    const rzp1 = new Razorpay(options);
                    rzp1.open();
                } else {
                    alert('Order creation failed: ' + result.message);
                }
            } catch (error) {
                console.error(error);
                alert('Payment initialization error.');
            } finally {
                payBtn.disabled = false;
                payBtn.innerText = 'COMPLETE ORDER';
            }
        }

        async function verifyPayment(paymentResult, localOrderId) {
            try {
                const response = await fetch(`${API_BASE_URL}/verify_payment.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        razorpay_order_id: paymentResult.razorpay_order_id,
                        razorpay_payment_id: paymentResult.razorpay_payment_id,
                        razorpay_signature: paymentResult.razorpay_signature,
                        order_id: localOrderId
                    })
                });

                const result = await response.json();
                if(result.status === 'success') {
                    localStorage.removeItem('gb_cart');
                    alert('ORDER SUCCESSFUL! Welcome to the Green Army.');
                    window.location.href = 'index.html';
                } else {
                    alert('Payment verification failed.');
                }
            } catch (error) {
                alert('Connection error during verification.');
            }
        }
    </script>
</body>
</html>
